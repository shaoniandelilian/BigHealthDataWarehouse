# realtime_rag_pipeline/configs/pipeline_doc_ai.yaml
# 【预设三】: 实时文档智能解析与多维向量入库流水线
# 适用场景：接收服务端发来的 PDF 或 Markdown，经过 MinerU 解析、内容清洗、语义分块、向量化最终落盘 Milvus。

pipeline_steps:
  # -----------------------------------------------------------------
  # [1] 提取层 (Extraction)
  # 提示：下方提供了「备用快速提取」与「MinerU深度解析」两种算子方案。
  # ⚠️ 注意：这两种抽取算子只能同时取消注释并启用【其中一个】！
  # -----------------------------------------------------------------

  # 【方案 A：已启用】备用纯本地快速 PDF 提取 (PyMuPDF4LLM)
  # 无需启动后台 MinerU 服务，纯规则高速提取，适合纯文本 PDF。
  - name: "MinerUOCRProcessor"
    params:
      output_dir: "./data_process/result"
      backend: "pymupdf4llm"

  # 【方案 B：已注释】MinerU (magic-pdf) 深度学习排版分析解决方案
  # 可精准识别复杂公式、表格与分栏布局。需要通过 `python services/mineru_server.py` 拉起服务。
  # - name: "MinerUOCRProcessor"
  #   params:
  #     mineru_host: "127.0.0.1"
  #     mineru_port: 8000
  #     output_dir: "./data_process/result"
  #     backend: "magic-pdf"
  #     parse_method: "auto"

  # -----------------------------------------------------------------
  # [2] 清洗层 (Transformation) - 文本清洗
  # Markdown 深度去噪：去除无用图片链接、HTML表格、图表引用与乱码修正
  # -----------------------------------------------------------------
  - name: "MarkdownCleanerProcessor"
    params: {} # 全自动正则清洗，无需额外参数

  # -----------------------------------------------------------------
  # [3] 清洗层 (Transformation) - 结构与语义切分
  # 混合切分器：先用 Markdown 层级结构切分，再进行 Token-Aware 的语义防断裂切分
  # -----------------------------------------------------------------
  - name: "SemanticChunkerProcessor"
    params:
      embedding_dir: "/data/ruanhao/model/KaLM-embedding-multilingual-mini-instruct-v2.5"
      device: "cuda"
      normalize_embeddings: true
      strip_headers: true
      struct_chunk_size: 500
      max_tokens: 384

  # -----------------------------------------------------------------
  # [4] (可选) AI 审核与提纯层 (LLM Review)
  # LLM 断点并发审核：利用大语言模型甄别切分出的 Chunk，丢弃无意义错乱文本，并润色可用文本。
  # 提示: 默认关闭。如需启用，请取消下方注释并确保环境变量 DEEPSEEK_API_KEY 已配置
  # -----------------------------------------------------------------
  # - name: "LLMChunkReviewerProcessor"
  #   params:
  #     model: "deepseek-chat"
  #     max_workers: 10          # 并发处理 10 个切片
  #     timeout: 45               # 防止网络死锁
  #     # system_prompt: "..."    # 如需定制审核角色，可取消此行并写入 prompt
  #     # user_prompt_template: "评估以下文本块：\n{text}\n如果全为废话或无结构菜单，仅输出 '[REJECT]'。否则只输出优化后的干净文本。"

  # -----------------------------------------------------------------
  # [4.5] (可选) 切片级人工介入挂起栏杆 (Chunk-Level HITL)
  # 如果上游 LLM 对部分切片输出 [UNCERTAIN]，此挂起器将拦截整篇文档。
  # 需要通过 /api/v1/review/chunks/{context_id} 接口人工覆盖并清除疑问。
  # -----------------------------------------------------------------
  # - name: "ChunkLevelReviewPause"
  #   params: {}

  # -----------------------------------------------------------------
  # [5] 向量表征层 (Embedding)
  # Yuan Embedding 大模型：将最终清洗出的描述性短文本全部压缩为密集向量
  # -----------------------------------------------------------------
  - name: "YuanEmbedderProcessor"
    params:
      model_path: "/data/zhenrong/model/Yuan_embedding"
      device: "cuda"
      batch_size: 64
      max_length: 512

  # -----------------------------------------------------------------
  # [5] 终态落地层 (Loading)
  # Milvus 向量数据库持久化入库 (确保 Schema 一致)
  # -----------------------------------------------------------------
  - name: "MilvusTypeLoader"
    params:
      host: "47.98.227.81"    # Milvus 远程服务器 IP
      port: "8050"            # Milvus 连接端口
      collection: "test_pdf"      # Target new fresh collection to avoid schema conflicts
      batch_size: 500         # 批量入库大小
      # 动态计算维度，若有默认值可在此写死，Yuan Embedding 通常为 1024 或更高维
      # dimension: ...
