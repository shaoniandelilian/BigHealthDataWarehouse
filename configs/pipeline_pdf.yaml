# realtime_rag_pipeline/configs/pipeline_pdf.yaml
# 【预设二】: 期刊论文或财报长篇 PDF 抽取与切块专线
# 适用场景：处理非结构化的本地海量 PDF，并使用 OCR + 切块入库。

pipeline_steps:
  # -----------------------------------------------------------------
  # [1] 非结构化解析层 (PDF to Markdown)
  # DeepSeek-OCR vLLM 版式恢复：挂载显卡抽取多层排版文本（非常吃显存）
  # -----------------------------------------------------------------
  - name: "PdfOcrProcessor"
    params:
      model_path: "deepseek-ai/DeepSeek-OCR"  # 直接使用 HuggingFace 缓存的 registry 名字
      dpi: 144              # 控制 PDF 转图片的清晰度 (144是个兼顾显存和精度的甜点)
      lazy_load: true       # 务必保持 true，让 vLLM 懒加载防阻塞网页网关

  # -----------------------------------------------------------------
  # [2] 长文本切割层 (Chunking)
  # 将单一长文强制爆破成数组（Chunks），以绕掉 BGE 模型的最大 Token 长度锁定
  # -----------------------------------------------------------------
  - name: "MarkdownChunker"
    params:
      chunk_size: 512       # 切割滑窗的单片大小（字符数）
      chunk_overlap: 50     # 两个语料块之间的重叠字符数（防断句断义产生隔离）

  # -----------------------------------------------------------------
  # [3] 人工介入层 (Human-In-The-Loop) [默认关闭]
  # 若 OCR 抽出的一堆乱码符号需要纠正，必须打开此处
  # -----------------------------------------------------------------
  - name: "HumanReviewPause"
    params:
      always_pause: true

  # -----------------------------------------------------------------
  # [4] 向量表征层 (Embedding)
  # 注意：在有了 Chunking 算子后，此算子将对 Chunks 数组执行遍历隐射！
  # -----------------------------------------------------------------
  - name: "BgeEmbedder"
    params:
      model_path: "/data/wuteng/rag-embed/bge-large-zh-v1.5"
      local_files_only: true
      normalize_embeddings: true

  # -----------------------------------------------------------------
  # [5] 终态落地层 (Loading)
  # -----------------------------------------------------------------
  - name: "MilvusLoader"
    params:
      host: "47.98.227.81"
      port: "8050"
      collection: "test_wuji_pdf" # 目标独立库
      dimension: 1024
