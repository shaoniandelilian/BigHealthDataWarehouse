apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-jars
  namespace: lakehouse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: jar-downloader
  namespace: lakehouse
  labels:
    app: jar-downloader
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /jars/lib /jars/opt /jars/plugins /jars/hadoop-uber

              download() {
                local url="$1"
                local dest="$2"
                echo "Downloading $dest ..."
                curl -fL --retry 3 --retry-delay 5 --connect-timeout 30 -o "$dest" "$url"
              }

              echo "=== Downloading Flink connectors from Maven ==="
              download "https://repo1.maven.org/maven2/org/apache/paimon/paimon-flink-1.20/1.3.1/paimon-flink-1.20-1.3.1.jar" \
                /jars/lib/paimon-flink-1.20-1.3.1.jar
              download "https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.3.0-1.20/flink-sql-connector-kafka-3.3.0-1.20.jar" \
                /jars/lib/flink-sql-connector-kafka-3.3.0-1.20.jar

              echo "=== Downloading Flink S3 plugin ==="
              download "https://repo1.maven.org/maven2/org/apache/flink/flink-s3-fs-hadoop/1.20.3/flink-s3-fs-hadoop-1.20.3.jar" \
                /jars/plugins/flink-s3-fs-hadoop-1.20.3.jar

              echo "=== Downloading Paimon bundles ==="
              download "https://repo.maven.apache.org/maven2/org/apache/paimon/paimon-bundle/1.3.1/paimon-bundle-1.3.1.jar" \
                /jars/lib/paimon-bundle-1.3.1.jar
              download "https://repo.maven.apache.org/maven2/org/apache/paimon/paimon-s3/1.3.1/paimon-s3-1.3.1.jar" \
                /jars/lib/paimon-s3-1.3.1.jar

              echo "=== Downloading Flink Hive connector ==="
              download "https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-hive-3.1.3_2.12/1.20.0/flink-sql-connector-hive-3.1.3_2.12-1.20.0.jar" \
                /jars/lib/flink-sql-connector-hive-3.1.3-1.20.0.jar

              echo "=== Downloading Hadoop uber jar ==="
              download "https://repo.maven.apache.org/maven2/org/apache/flink/flink-shaded-hadoop-2-uber/2.8.3-10.0/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar" \
                /jars/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar

              echo "=== All essential JARs downloaded successfully ==="
              ls -lhR /jars/
              touch /jars/.download-complete
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: flink-jars
              mountPath: /jars
      volumes:
        - name: flink-jars
          persistentVolumeClaim:
            claimName: flink-jars
