apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: lakehouse
  labels:
    app: flink-jobmanager
spec:
  type: NodePort
  selector:
    app: flink-jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
      nodePort: 30623
    - name: web
      port: 8081
      targetPort: 8081
      nodePort: 30081
    - name: blob
      port: 6124
      targetPort: 6124
      nodePort: 30624
