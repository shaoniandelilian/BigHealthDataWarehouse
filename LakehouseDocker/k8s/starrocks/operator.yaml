apiVersion: v1
kind: ServiceAccount
metadata:
  name: starrocks
  namespace: lakehouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-starrocks-operator
  labels:
    app: kube-starrocks-operator
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["configmaps", "serviceaccounts", "services"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["endpoints", "pods", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["starrocks.com"]
    resources: ["starrocksclusters", "starrockswarehouses"]
    verbs: ["*"]
  - apiGroups: ["starrocks.com"]
    resources: ["starrocksclusters/finalizers", "starrockswarehouses/finalizers"]
    verbs: ["update"]
  - apiGroups: ["starrocks.com"]
    resources: ["starrocksclusters/status", "starrockswarehouses/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-starrocks-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-starrocks-operator
subjects:
  - kind: ServiceAccount
    name: starrocks
    namespace: lakehouse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-operator
  namespace: lakehouse
  labels:
    app: kube-starrocks-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-starrocks-operator
  template:
    metadata:
      labels:
        app: kube-starrocks-operator
    spec:
      serviceAccountName: starrocks
      containers:
        - name: operator
          image: starrocks/operator:latest
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
