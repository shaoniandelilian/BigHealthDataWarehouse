apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: lakehouse
data:
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW__WEBSERVER__RBAC: "True"
  FLINK_REST_URL: "http://flink-jobmanager:8081"
