apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: lakehouse
  labels:
    app: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while ! nc -z mysql 3306; do sleep 3; done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: copy-flink-env
          image: flink:1.20-scala_2.12-java17
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp -a /opt/flink/. /flink-home/ &&
              cp -a /opt/java/openjdk/. /flink-java/ &&
              sed -i 's/^    address: localhost$/    address: flink-jobmanager/' /flink-home/conf/config.yaml &&
              sed -i 's/^  address: 0\.0\.0\.0$/  address: flink-jobmanager/' /flink-home/conf/config.yaml
          volumeMounts:
            - name: flink-home
              mountPath: /flink-home
            - name: flink-java
              mountPath: /flink-java
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
        - name: copy-flink-jars
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while [ ! -f /jars/.download-complete ]; do sleep 5; done
              cp /jars/lib/*.jar /flink-home/lib/ 2>/dev/null || true
              cp /jars/opt/*.jar /flink-home/opt/ 2>/dev/null || true
              cp /jars/plugins/*.jar /flink-home/plugins/ 2>/dev/null || true
              cp /jars/hadoop-uber/*.jar /hadoop-uber/ 2>/dev/null || true
          volumeMounts:
            - name: flink-jars
              mountPath: /jars
              readOnly: true
            - name: flink-home
              mountPath: /flink-home
            - name: hadoop-uber
              mountPath: /hadoop-uber
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: db-init
          image: apache/airflow:2.11.2
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          command:
            - bash
            - -c
            - |
              set -e
              echo "Running airflow db migrate..."
              airflow db migrate
              echo "Creating admin user..."
              airflow users create \
                --username admin \
                --password admin \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@lakehouse.local || true
              echo "Airflow init complete."
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      containers:
        - name: scheduler
          image: apache/airflow:2.11.2
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          env:
            - name: PATH
              value: "/home/airflow/.local/bin:/opt/flink/bin:/opt/flink-java/openjdk/bin:/usr/local/bin:/usr/bin:/bin"
            - name: FLINK_HOME
              value: /opt/flink
            - name: JAVA_HOME
              value: /opt/flink-java/openjdk
            - name: HADOOP_CONF_DIR
              value: /opt/hadoop/conf
            - name: FLINK_LOG_DIR
              value: /tmp/flink-logs
            - name: HADOOP_CLASSPATH
              value: /opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - airflow
                - jobs
                - check
                - --job-type
                - SchedulerJob
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: airflow-logs
              mountPath: /opt/airflow/logs
            - name: flink-home
              mountPath: /opt/flink
            - name: flink-java
              mountPath: /opt/flink-java/openjdk
              readOnly: true
            - name: hadoop-uber
              mountPath: /opt/hadoop-uber
              readOnly: true
            - name: core-site
              mountPath: /opt/hadoop/conf/core-site.xml
              subPath: core-site.xml
        - name: webserver
          image: apache/airflow:2.11.2
          command: ["airflow", "webserver"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          ports:
            - containerPort: 8080
              name: web
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
              readOnly: true
            - name: airflow-logs
              mountPath: /opt/airflow/logs
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
        - name: airflow-logs
          emptyDir: {}
        - name: flink-home
          emptyDir: {}
        - name: flink-java
          emptyDir: {}
        - name: hadoop-uber
          emptyDir: {}
        - name: core-site
          configMap:
            name: lakehouse-config
            items:
              - key: core-site.xml
                path: core-site.xml
        - name: flink-jars
          persistentVolumeClaim:
            claimName: flink-jars
            readOnly: true
