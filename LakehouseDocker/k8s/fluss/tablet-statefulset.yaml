apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fluss-tablet
  namespace: lakehouse
  labels:
    app: fluss-tablet
spec:
  serviceName: fluss-tablet
  replicas: 1
  selector:
    matchLabels:
      app: fluss-tablet
  template:
    metadata:
      labels:
        app: fluss-tablet
    spec:
      initContainers:
        - name: merge-plugins
          image: apache/fluss:0.9.0-incubating
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for jar-downloader to complete..."
              while [ ! -f /tmp/shared-jars/.download-complete ]; do
                sleep 5
              done
              cp /opt/fluss/plugins/paimon/* /merged-plugins/ 2>/dev/null || true
              cp /tmp/shared-jars/lib/paimon-s3-1.3.1.jar /merged-plugins/ 2>/dev/null || true
              ls -la /merged-plugins/
          volumeMounts:
            - name: flink-jars
              mountPath: /tmp/shared-jars
              readOnly: true
            - name: paimon-plugin
              mountPath: /merged-plugins
      containers:
        - name: tablet
          image: apache/fluss:0.9.0-incubating
          command:
            - /bin/bash
            - -c
            - |
              export FLUSS_PROPERTIES="
              zookeeper.address: zookeeper:2181
              bind.listeners: FLUSS://${POD_IP}:9123
              data.dir: /tmp/fluss/data
              remote.data.dir: s3://fluss/remote-data
              s3.endpoint: http://minio.lakehouse.svc.cluster.local
              s3.access-key: minioadmin
              s3.secret-key: minioadmin
              s3.path.style.access: true
              kv.snapshot.interval: 10s
              datalake.format: paimon
              datalake.paimon.metastore: filesystem
              datalake.paimon.warehouse: s3://fluss/paimon
              datalake.paimon.s3.endpoint: http://minio.lakehouse.svc.cluster.local
              datalake.paimon.s3.access-key: minioadmin
              datalake.paimon.s3.secret-key: minioadmin
              datalake.paimon.s3.path.style.access: true
              "
              exec /docker-entrypoint.sh tabletServer
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 9123
              name: rpc
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: paimon-plugin
              mountPath: /opt/fluss/plugins/paimon
      volumes:
        - name: flink-jars
          persistentVolumeClaim:
            claimName: flink-jars
            readOnly: true
        - name: paimon-plugin
          emptyDir: {}
