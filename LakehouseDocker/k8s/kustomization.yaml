apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lakehouse

resources:
  # Namespace
  - namespace.yaml

  # Shared config & secrets
  - configmap.yaml
  - secret.yaml

  # Flink JAR dependencies
  - flink/jar-downloader-job.yaml

  # Flink (stream processing)
  - flink/jobmanager-service.yaml
  - flink/jobmanager-deployment.yaml
  - flink/taskmanager-deployment.yaml
  - flink/taskmanager-hpa.yaml

  # MySQL (shared by Airflow, StreamPark & Superset)
  - mysql/secret.yaml
  - mysql/pvc.yaml
  - mysql/deployment.yaml
  - mysql/service.yaml

  # Airflow (batch scheduler)
  - airflow/secret.yaml
  - airflow/configmap.yaml
  - airflow/dags-pvc.yaml
  - airflow/deployment.yaml
  - airflow/webserver-service.yaml

  # StreamPark (stream job management)
  - streampark/secret.yaml
  - streampark/configmap.yaml
  - streampark/workspace-pvc.yaml
  - streampark/console-deployment.yaml
  - streampark/console-service.yaml

  # Superset (BI dashboard)
  - superset/secret.yaml
  - superset/configmap.yaml
  - superset/deployment.yaml
  - superset/service.yaml

  # StarRocks (OLAP engine, via operator)
  - starrocks/operator.yaml
  - starrocks/cluster.yaml
  - starrocks/service.yaml
