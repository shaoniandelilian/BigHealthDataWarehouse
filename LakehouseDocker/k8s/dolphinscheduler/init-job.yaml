apiVersion: batch/v1
kind: Job
metadata:
  name: dolphinscheduler-init
  namespace: lakehouse
  labels:
    app: dolphinscheduler-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
      containers:
        - name: init-schema
          image: apache/dolphinscheduler-tools:3.2.2
          command:
            - bash
            - /opt/dolphinscheduler/tools/bin/upgrade-schema.sh
          envFrom:
            - configMapRef:
                name: dolphinscheduler-config
            - secretRef:
                name: dolphinscheduler-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
