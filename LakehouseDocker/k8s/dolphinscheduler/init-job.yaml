apiVersion: batch/v1
kind: Job
metadata:
  name: dolphinscheduler-init
  namespace: lakehouse
  labels:
    app: dolphinscheduler-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
        - name: download-mysql-driver
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              curl -fL --retry 3 --retry-delay 5 -o /driver/mysql-connector-j-8.0.33.jar                 https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar &&               echo "MySQL driver downloaded."
          volumeMounts:
            - name: mysql-driver
              mountPath: /driver
      containers:
        - name: init-schema
          image: apache/dolphinscheduler-tools:3.2.2
          env:
            - name: JAVA_OPTS
              value: "-server -Xms512m -Xmx512m -Xmn256m"
          command:
            - bash
            - /opt/dolphinscheduler/tools/bin/upgrade-schema.sh
          envFrom:
            - configMapRef:
                name: dolphinscheduler-config
            - secretRef:
                name: dolphinscheduler-secret
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: mysql-driver
              mountPath: /opt/dolphinscheduler/tools/libs/mysql-connector-j-8.0.33.jar
              subPath: mysql-connector-j-8.0.33.jar
      volumes:
        - name: mysql-driver
          emptyDir: {}
