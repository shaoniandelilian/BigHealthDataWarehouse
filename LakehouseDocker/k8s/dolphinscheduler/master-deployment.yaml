apiVersion: apps/v1
kind: Deployment
metadata:
  name: dolphinscheduler-master
  namespace: lakehouse
  labels:
    app: dolphinscheduler-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dolphinscheduler-master
  template:
    metadata:
      labels:
        app: dolphinscheduler-master
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while \! nc -z mysql 3306; do sleep 3; done
        - name: download-mysql-driver
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              curl -fL -o /driver/mysql-connector-j-8.0.33.jar \
                https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar && \
              echo "MySQL driver downloaded."
          volumeMounts:
            - name: mysql-driver
              mountPath: /driver
      containers:
        - name: master
          image: apache/dolphinscheduler-master:3.2.2
          envFrom:
            - configMapRef:
                name: dolphinscheduler-config
            - secretRef:
                name: dolphinscheduler-secret
          ports:
            - containerPort: 5678
              name: rpc
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            tcpSocket:
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5678
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: mysql-driver
              mountPath: /opt/dolphinscheduler/libs/mysql-connector-j-8.0.33.jar
              subPath: mysql-connector-j-8.0.33.jar
      volumes:
        - name: mysql-driver
          emptyDir: {}
