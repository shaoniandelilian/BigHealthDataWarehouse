apiVersion: v1
kind: ConfigMap
metadata:
  name: lakehouse-config
  namespace: lakehouse
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
        <property>
            <name>fs.s3a.access.key</name>
            <value><your-access-key></value>
        </property>
        <property>
            <name>fs.s3a.secret.key</name>
            <value><your-secret-key></value>
        </property>
        <property>
            <name>fs.s3a.endpoint</name>
            <value><your-endpoint></value>
        </property>
        <property>
            <name>fs.s3a.path.style.access</name>
            <value>false</value>
        </property>
    </configuration>
