apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: lakehouse
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      securityContext:
        fsGroup: 1001
      initContainers:
        - name: kafka-init
          image: bitnamilegacy/kafka:3.3.2-debian-11-r11
          command:
            - bash
            - -c
            - |
              if [ ! -f /bitnami/kafka/data/meta.properties ]; then
                mkdir -p /bitnami/kafka/data
                cat > /tmp/kraft.properties <<'PROPS'
              process.roles=broker,controller
              node.id=0
              controller.quorum.voters=0@localhost:9093
              listeners=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
              listener.security.protocol.map=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
              controller.listener.names=CONTROLLER
              log.dirs=/bitnami/kafka/data
              PROPS
                /opt/bitnami/kafka/bin/kafka-storage.sh format \
                  -t LffJe0wKQ2G6M0JqfKJk4Q \
                  -c /tmp/kraft.properties
              fi
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
      containers:
        - name: kafka
          image: bitnamilegacy/kafka:3.3.2-debian-11-r11
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9094
              name: external
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_CLUSTER_ID
              value: LffJe0wKQ2G6M0JqfKJk4Q
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_BROKER_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: controller,broker
            - name: KAFKA_CFG_LISTENERS
              value: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092,EXTERNAL://localhost:30092
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: 0@kafka-0.kafka-headless.lakehouse.svc.cluster.local:9093
            - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_MIN_INSYNC_REPLICAS
              value: "1"
            - name: KAFKA_CFG_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
            - name: KAFKA_HEAP_OPTS
              value: -Xms512m -Xmx512m
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
