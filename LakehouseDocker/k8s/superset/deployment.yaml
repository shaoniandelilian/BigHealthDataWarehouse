apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: lakehouse
  labels:
    app: superset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: ensure-superset-db
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: MYSQL_ROOT_PASSWORD
            - name: SUPERSET_DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: SUPERSET_DB_USER
            - name: SUPERSET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: SUPERSET_DB_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Ensuring Superset database and user exist..."
              until mysqladmin ping -hmysql -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent; do
                sleep 3
              done
              mysql -hmysql -uroot -p"${MYSQL_ROOT_PASSWORD}" <<SQL
              CREATE DATABASE IF NOT EXISTS superset CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE USER IF NOT EXISTS '${SUPERSET_DB_USER}'@'%' IDENTIFIED BY '${SUPERSET_DB_PASSWORD}';
              ALTER USER '${SUPERSET_DB_USER}'@'%' IDENTIFIED BY '${SUPERSET_DB_PASSWORD}';
              GRANT ALL PRIVILEGES ON superset.* TO '${SUPERSET_DB_USER}'@'%';
              FLUSH PRIVILEGES;
              SQL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: superset-init
          image: apache/superset:6.0.0
          securityContext:
            runAsUser: 0
          envFrom:
            - secretRef:
                name: superset-secret
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            - name: SUPERSET_HOME
              value: /app/superset_home
            - name: SUPERSET_PORT
              value: "8088"
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Switching apt to aliyun mirror ==="
              if [ -f /etc/apt/sources.list.d/debian.sources ]; then
                sed -i 's|deb.debian.org|mirrors.aliyun.com|g' /etc/apt/sources.list.d/debian.sources
              elif [ -f /etc/apt/sources.list ]; then
                sed -i 's|deb.debian.org|mirrors.aliyun.com|g' /etc/apt/sources.list
              fi

              echo "=== apt-get update ==="
              apt-get update

              echo "=== apt-get install ==="
              apt-get install -y --no-install-recommends \
                pkg-config python3-dev default-libmysqlclient-dev build-essential

              echo "=== pip install ==="
              pip install --no-cache-dir --target /app/.venv/lib/python3.10/site-packages \
                -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com \
                mysqlclient starrocks==1.0.6

              echo "=== Verify mysqlclient ==="
              /app/.venv/bin/python -c "import MySQLdb; print('MySQLdb OK')"

              echo "=== superset db upgrade ==="
              superset db upgrade
              if ! superset fab list-users | grep -q "username:${SUPERSET_ADMIN_USERNAME}"; then
                superset fab create-admin \
                  --username "${SUPERSET_ADMIN_USERNAME}" \
                  --firstname "${SUPERSET_ADMIN_FIRSTNAME}" \
                  --lastname "${SUPERSET_ADMIN_LASTNAME}" \
                  --email "${SUPERSET_ADMIN_EMAIL}" \
                  --password "${SUPERSET_ADMIN_PASSWORD}"
              fi
              superset init
          volumeMounts:
            - name: config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
            - name: superset-home
              mountPath: /app/superset_home
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      containers:
        - name: superset
          image: apache/superset:6.0.0
          securityContext:
            runAsUser: 0
          envFrom:
            - secretRef:
                name: superset-secret
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            - name: SUPERSET_HOME
              value: /app/superset_home
          command:
            - /bin/sh
            - -c
            - |
              set -e
              sed -i 's|deb.debian.org|mirrors.aliyun.com|g' /etc/apt/sources.list.d/debian.sources 2>/dev/null || \
                sed -i 's|deb.debian.org|mirrors.aliyun.com|g' /etc/apt/sources.list
              apt-get update && apt-get install -y --no-install-recommends \
                pkg-config python3-dev default-libmysqlclient-dev build-essential
              pip install --no-cache-dir --target /app/.venv/lib/python3.10/site-packages \
                -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com \
                mysqlclient starrocks==1.0.6
              gunicorn \
                --bind 0.0.0.0:8088 \
                --workers 2 \
                --timeout 120 \
                --limit-request-line 0 \
                --limit-request-field_size 0 \
                "superset.app:create_app()"
          ports:
            - containerPort: 8088
              name: web
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
            - name: superset-home
              mountPath: /app/superset_home
      volumes:
        - name: config
          configMap:
            name: superset-config
        - name: superset-home
          emptyDir: {}
