apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: lakehouse
  labels:
    app: airflow-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: init-db
          image: apache/airflow:2.11.2
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          command:
            - bash
            - -c
            - |
              set -e
              echo "Running airflow db migrate..."
              airflow db migrate
              echo "Creating admin user..."
              airflow users create \
                --username admin \
                --password admin \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@lakehouse.local
              echo "Airflow init complete."
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
