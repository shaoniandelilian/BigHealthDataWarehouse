apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-fe-conf
  namespace: lakehouse
data:
  fe.conf: |
    CUR_DATE=`date +%Y%m%d-%H%M%S`
    LOG_DIR=${DORIS_HOME}/log
    JAVA_OPTS_FOR_JDK_17="-Djavax.security.auth.useSubjectCredsOnly=false -Xss4m -Xmx3072m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:SurvivorRatio=8 -XX:MaxTenuringThreshold=7 -XX:G1HeapRegionSize=8m -XX:SoftRefLRUPolicyMSPerMB=0 -Xlog:gc*:$DORIS_HOME/log/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M"
    enable_fqdn_mode=true
    http_port=8030
    rpc_port=9020
    query_port=9030
    edit_log_port=9010
