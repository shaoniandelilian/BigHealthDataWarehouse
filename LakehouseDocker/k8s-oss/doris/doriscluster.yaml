apiVersion: doris.selectdb.com/v1
kind: DorisCluster
metadata:
  name: doriscluster-lakehouse
  namespace: lakehouse
spec:
  feSpec:
    replicas: 1
    image: apache/doris:fe-3.1.4
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 4Gi
    configMapInfo:
      configMapName: doris-fe-conf
      resolveKey: fe.conf
    persistentVolumes:
      - mountPath: /opt/apache-doris/fe/doris-meta
        name: fe-meta
        persistentVolumeClaimSpec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
  beSpec:
    replicas: 1
    image: apache/doris:be-3.1.4
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 5Gi
    configMapInfo:
      configMapName: doris-be-conf
      resolveKey: be.conf
    persistentVolumes:
      - mountPath: /opt/apache-doris/be/storage
        name: be-storage
        persistentVolumeClaimSpec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
