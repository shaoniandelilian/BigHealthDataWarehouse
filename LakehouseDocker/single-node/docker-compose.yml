services:
  #begin RustFS (S3-compatible storage)
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.83
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs-data:/data
    command: /data
  rustfs-init:
    image: minio/mc
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      until mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin; do
        echo 'Waiting for RustFS...';
        sleep 1;
      done;
      mc mb --ignore-existing rustfs/fluss;
      "
  #end
  #begin Fluss
  fluss-coordinator:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    depends_on:
      zookeeper:
        condition: service_started
      rustfs-init:
        condition: service_completed_successfully
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://fluss-coordinator:9123
        remote.data.dir: s3://fluss/remote-data
        s3.endpoint: http://rustfs:9000
        s3.access-key: rustfsadmin
        s3.secret-key: rustfsadmin
        s3.path.style.access: true
        datalake.format: paimon
        datalake.paimon.metastore: filesystem
        datalake.paimon.warehouse: s3://fluss/paimon
        datalake.paimon.s3.endpoint: http://rustfs:9000
        datalake.paimon.s3.access-key: rustfsadmin
        datalake.paimon.s3.secret-key: rustfsadmin
        datalake.paimon.s3.path.style.access: true
    volumes:
      - ./lib/paimon-s3-1.3.1.jar:/opt/fluss/plugins/paimon/paimon-s3-1.3.1.jar
  fluss-tablet:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    depends_on:
      - fluss-coordinator
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://fluss-tablet:9123
        data.dir: /tmp/fluss/data
        remote.data.dir: s3://fluss/remote-data
        s3.endpoint: http://rustfs:9000
        s3.access-key: rustfsadmin
        s3.secret-key: rustfsadmin
        s3.path.style.access: true
        kv.snapshot.interval: 10s
        datalake.format: paimon
        datalake.paimon.metastore: filesystem
        datalake.paimon.warehouse: s3://fluss/paimon
        datalake.paimon.s3.endpoint: http://rustfs:9000
        datalake.paimon.s3.access-key: rustfsadmin
        datalake.paimon.s3.secret-key: rustfsadmin
        datalake.paimon.s3.path.style.access: true
    volumes:
      - ./lib/paimon-s3-1.3.1.jar:/opt/fluss/plugins/paimon/paimon-s3-1.3.1.jar
  zookeeper:
    restart: always
    image: zookeeper:3.9.2
  #end
  #begin Flink
  flink-jobmanager:
    image: flink:1.20-scala_2.12-java17
    ports:
      - "8081:8081"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       cp /tmp/opt/*.jar /opt/flink/opt/ 2>/dev/null || true;
       mkdir -p /opt/flink/plugins/s3-fs-hadoop;
       cp /opt/flink/opt/flink-s3-fs-hadoop-1.20.3.jar /opt/flink/plugins/s3-fs-hadoop/;
       /docker-entrypoint.sh jobmanager"
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/conf
      - HADOOP_CLASSPATH=/opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://rustfs:9000
      - AWS_ACCESS_KEY=rustfsadmin
      - AWS_SECRET_KEY=rustfsadmin
    volumes:
      - ./lib:/tmp/jars
      - ./opt:/tmp/opt
      - ./core-site.xml:/opt/hadoop/conf/core-site.xml
      - ./hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar:/opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
      - ${HOST_DATA_DIR:-/data/pubchem}:/host-data
  flink-taskmanager:
    image: flink:1.20-scala_2.12-java17
    depends_on:
      - flink-jobmanager
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       cp /tmp/opt/*.jar /opt/flink/opt/ 2>/dev/null || true;
       mkdir -p /opt/flink/plugins/s3-fs-hadoop;
       cp /opt/flink/opt/flink-s3-fs-hadoop-1.20.3.jar /opt/flink/plugins/s3-fs-hadoop/;
       /docker-entrypoint.sh taskmanager"
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/conf
      - HADOOP_CLASSPATH=/opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 10
        taskmanager.memory.process.size: 2048m
        taskmanager.memory.task.off-heap.size: 128m
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://rustfs:9000
      - AWS_ACCESS_KEY=rustfsadmin
      - AWS_SECRET_KEY=rustfsadmin
    volumes:
      - ./lib:/tmp/jars
      - ./opt:/tmp/opt
      - ./core-site.xml:/opt/hadoop/conf/core-site.xml
      - ./hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar:/opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
      - ${HOST_DATA_DIR:-/data/pubchem}:/host-data
  #end

  #begin Doris
  doris-fe:
    image: apache/doris:fe-2.1.8
    hostname: doris-fe
    ports:
      - "8030:8030"
      - "9030:9030"
    networks:
      doris_net:
        ipv4_address: ${DORIS_FE_IP:-172.30.0.10}
    environment:
      - FE_SERVERS=fe1:${DORIS_FE_IP:-172.30.0.10}:9010
      - FE_ID=1
      - PRIORITY_NETWORKS=${DORIS_PRIORITY_NETWORKS:-172.30.0.0/24}
    volumes:
      - ./doris/fe/meta:/opt/apache-doris/fe/doris-meta
      - ./doris/fe/log:/opt/apache-doris/fe/log
    command: >
      bash -lc "
      /opt/apache-doris/fe/bin/start_fe.sh --daemon &&
      tail -f /opt/apache-doris/fe/log/fe.out
      "

  doris-be:
    image: apache/doris:be-2.1.8
    hostname: doris-be
    depends_on:
      - doris-fe
    networks:
      doris_net:
        ipv4_address: ${DORIS_BE_IP:-172.30.0.11}
    environment:
      - FE_SERVERS=fe1:${DORIS_FE_IP:-172.30.0.10}:9010
      - BE_ADDR=${DORIS_BE_IP:-172.30.0.11}:9050
      - PRIORITY_NETWORKS=${DORIS_PRIORITY_NETWORKS:-172.30.0.0/24}
    volumes:
      - ./doris/be/storage:/opt/apache-doris/be/storage
      - ./doris/be/log:/opt/apache-doris/be/log
    command: >
      bash -lc "
      /opt/apache-doris/be/bin/start_be.sh --daemon &&
      tail -f /opt/apache-doris/be/log/be.out
      "
  #end

volumes:
  rustfs-data:

networks:
  doris_net:
    ipam:
      config:
        - subnet: ${DORIS_NET_SUBNET:-172.30.0.0/24}
