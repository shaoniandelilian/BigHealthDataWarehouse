apiVersion: apps/v1
kind: Deployment
metadata:
  name: streampark-console
  namespace: lakehouse
  labels:
    app: streampark-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streampark-console
  template:
    metadata:
      labels:
        app: streampark-console
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: console
          image: apache/streampark:2.1.5
          ports:
            - containerPort: 10000
              name: web
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: streampark-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streampark-secret
                  key: SPRING_DATASOURCE_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /opt/streampark/conf/application.yml
              subPath: application.yml
            - name: workspace
              mountPath: /opt/streampark/workspace
          livenessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: streampark-config
        - name: workspace
          persistentVolumeClaim:
            claimName: streampark-workspace
