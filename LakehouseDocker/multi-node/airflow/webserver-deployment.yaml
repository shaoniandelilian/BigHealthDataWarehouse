apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: lakehouse
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z mysql 3306; do
                sleep 3
              done
              echo "MySQL is ready."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: webserver
          image: apache/airflow:2.11.2-python3.11
          command:
            - /bin/bash
            - -c
            - |
              pip install mysqlclient --quiet &&
              exec airflow webserver
          ports:
            - containerPort: 8080
              name: web
          envFrom:
            - configMapRef:
                name: airflow-config
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW__CORE__FERNET_KEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
          livenessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: web
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
