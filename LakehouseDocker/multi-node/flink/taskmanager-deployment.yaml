apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: lakehouse
  labels:
    app: flink-taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-taskmanager
  template:
    metadata:
      labels:
        app: flink-taskmanager
    spec:
      initContainers:
        - name: copy-jars
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for jar-downloader to complete..."
              while [ ! -f /jars/.download-complete ]; do
                sleep 5
              done
              echo "JARs ready, copying..."
              cp /jars/lib/*.jar /flink-lib/ 2>/dev/null || true
              cp /jars/opt/*.jar /flink-opt/ 2>/dev/null || true
              cp /jars/plugins/*.jar /flink-plugins/ 2>/dev/null || true
              cp /jars/hadoop-uber/*.jar /flink-hadoop/ 2>/dev/null || true
          volumeMounts:
            - name: flink-jars
              mountPath: /jars
              readOnly: true
            - name: flink-lib
              mountPath: /flink-lib
            - name: flink-opt
              mountPath: /flink-opt
            - name: flink-plugins
              mountPath: /flink-plugins
            - name: flink-hadoop
              mountPath: /flink-hadoop
      containers:
        - name: taskmanager
          image: flink:1.20-scala_2.12-java17
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /init-lib/*.jar /opt/flink/lib/ 2>/dev/null || true
              cp /init-opt/*.jar /opt/flink/opt/ 2>/dev/null || true
              cp /init-plugins/*.jar /opt/flink/plugins/ 2>/dev/null || true
              /docker-entrypoint.sh taskmanager
          ports:
            - containerPort: 6121
              name: data
            - containerPort: 6122
              name: rpc
          env:
            - name: HADOOP_CONF_DIR
              value: /opt/hadoop/conf
            - name: HADOOP_CLASSPATH
              value: /opt/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                taskmanager.numberOfTaskSlots: 10
                taskmanager.memory.process.size: 2048m
                taskmanager.memory.task.off-heap.size: 128m
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ENDPOINT_URL
              value: http://minio.lakehouse.svc.cluster.local
          envFrom:
            - secretRef:
                name: s3-credentials
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: core-site
              mountPath: /opt/hadoop/conf/core-site.xml
              subPath: core-site.xml
            - name: flink-hadoop
              mountPath: /opt/hadoop-uber
              readOnly: true
            - name: flink-lib
              mountPath: /init-lib
              readOnly: true
            - name: flink-opt
              mountPath: /init-opt
              readOnly: true
            - name: flink-plugins
              mountPath: /init-plugins
              readOnly: true
      volumes:
        - name: flink-jars
          persistentVolumeClaim:
            claimName: flink-jars
            readOnly: true
        - name: core-site
          configMap:
            name: lakehouse-config
            items:
              - key: core-site.xml
                path: core-site.xml
        - name: flink-lib
          emptyDir: {}
        - name: flink-opt
          emptyDir: {}
        - name: flink-plugins
          emptyDir: {}
        - name: flink-hadoop
          emptyDir: {}
