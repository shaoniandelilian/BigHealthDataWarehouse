apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flink-jars
  namespace: lakehouse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: jar-downloader
  namespace: lakehouse
  labels:
    app: jar-downloader
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /jars/lib /jars/opt /jars/plugins /jars/hadoop-uber

              echo "Downloading Flink connectors..."
              curl -fL -o /jars/lib/flink-faker-0.5.3.jar \
                "https://github.com/knaufk/flink-faker/releases/download/v0.5.3/flink-faker-0.5.3.jar"
              curl -fL -o /jars/lib/fluss-flink-1.20-0.9.0-incubating.jar \
                "https://repo1.maven.org/maven2/org/apache/fluss/fluss-flink-1.20/0.9.0-incubating/fluss-flink-1.20-0.9.0-incubating.jar"
              curl -fL -o /jars/lib/paimon-flink-1.20-1.3.1.jar \
                "https://repo1.maven.org/maven2/org/apache/paimon/paimon-flink-1.20/1.3.1/paimon-flink-1.20-1.3.1.jar"

              echo "Downloading Flink S3 plugin..."
              curl -fL -o /jars/plugins/flink-s3-fs-hadoop-1.20.3.jar \
                "https://repo1.maven.org/maven2/org/apache/flink/flink-s3-fs-hadoop/1.20.3/flink-s3-fs-hadoop-1.20.3.jar"

              echo "Downloading Fluss lake plugins..."
              curl -fL -o /jars/lib/fluss-lake-paimon-0.9.0-incubating.jar \
                "https://repo1.maven.org/maven2/org/apache/fluss/fluss-lake-paimon/0.9.0-incubating/fluss-lake-paimon-0.9.0-incubating.jar"
              curl -fL -o /jars/lib/fluss-fs-s3-0.9.0-incubating.jar \
                "https://repo1.maven.org/maven2/org/apache/fluss/fluss-fs-s3/0.9.0-incubating/fluss-fs-s3-0.9.0-incubating.jar"

              echo "Downloading Paimon bundles..."
              curl -fL -o /jars/lib/paimon-bundle-1.3.1.jar \
                "https://repo.maven.apache.org/maven2/org/apache/paimon/paimon-bundle/1.3.1/paimon-bundle-1.3.1.jar"
              curl -fL -o /jars/lib/paimon-s3-1.3.1.jar \
                "https://repo.maven.apache.org/maven2/org/apache/paimon/paimon-s3/1.3.1/paimon-s3-1.3.1.jar"

              echo "Downloading Hadoop uber jar..."
              curl -fL -o /jars/hadoop-uber/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar \
                "https://repo.maven.apache.org/maven2/org/apache/flink/flink-shaded-hadoop-2-uber/2.8.3-10.0/flink-shaded-hadoop-2-uber-2.8.3-10.0.jar"

              echo "Downloading tiering service..."
              curl -fL -o /jars/opt/fluss-flink-tiering-0.9.0-incubating.jar \
                "https://repo1.maven.org/maven2/org/apache/fluss/fluss-flink-tiering/0.9.0-incubating/fluss-flink-tiering-0.9.0-incubating.jar"

              echo "All JARs downloaded successfully."
              ls -lhR /jars/
              touch /jars/.download-complete
          volumeMounts:
            - name: flink-jars
              mountPath: /jars
      volumes:
        - name: flink-jars
          persistentVolumeClaim:
            claimName: flink-jars
